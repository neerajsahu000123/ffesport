<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Esports Archive</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/assets/css/style.css">
<style>
.error-page { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
.error-code { font-family:'Bebas Neue',sans-serif; font-size:10rem; line-height:1; color:rgba(255,74,0,0.15); letter-spacing:10px; display:block; }
.error-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:4px; color:var(--white); margin:.5rem 0; }
.error-desc { color:var(--cinder); margin-bottom:2rem; max-width:400px; }
.error-links { display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="error-page">
  <div>
    <span class="error-code">404</span>
    <h1 class="error-title">PAGE NOT FOUND</h1>
    <p class="error-desc">The page you're looking for doesn't exist. It may have been moved or the URL might be incorrect.</p>
    <div class="error-links">
      <a href="/" class="btn-primary">← Back to Home</a>
      <a href="/tournaments.html" class="btn-outline">Browse Tournaments</a>
      <a href="/teams.html" class="btn-outline">Browse Teams</a>
    </div>
  </div>
</div>
</body>
</html>
