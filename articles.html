<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Articles — Esports Archive</title>
<link rel="stylesheet" href="assets/css/style.css">
<style>
.article-card-large {
  background:var(--ash); border:1px solid var(--soot); border-radius:var(--radius);
  padding:2rem; transition:var(--trans); cursor:pointer; position:relative; overflow:hidden;
}
.article-card-large::before { content:''; position:absolute; left:0;top:0;bottom:0; width:3px; background:var(--fire); opacity:0; transition:opacity .2s; }
.article-card-large:hover { border-color:rgba(255,74,0,0.4); }
.article-card-large:hover::before { opacity:1; }
.article-card-large.featured { border-top:2px solid var(--gold); }
.ac-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:1rem; }
.ac-category { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--fire); }
.ac-featured-badge { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:var(--gold); background:rgba(255,194,0,0.1); border:1px solid rgba(255,194,0,0.2); padding:2px 8px; }
.ac-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:2px; color:var(--white); line-height:1.2; margin-bottom:.75rem; }
.ac-summary { font-size:14px; color:var(--pale); line-height:1.6; margin-bottom:1.25rem; }
.ac-footer { display:flex; align-items:center; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.05); padding-top:1rem; }
.ac-meta { font-family:'Space Mono',monospace; font-size:10px; color:var(--cinder); }
</style>
</head>
<body>
<nav></nav>
<div class="mobile-menu" id="mobileMenu"></div>

<section class="page-hero">
  <div class="container">
    <div class="breadcrumb"><a href="index.html">Home</a><span class="sep">›</span><span class="current">Articles</span></div>
    <span class="page-hero-tag">// Archive Articles</span>
    <h1 class="page-hero-title">ARTICLES</h1>
    <p class="page-hero-desc">In-depth tournament recaps, team histories, player profiles, and milestone coverage — the written record of Indian Free Fire esports.</p>
  </div>
</section>

<section class="section-pad">
  <div class="container">
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;">
      <div class="search-bar" style="flex:1;min-width:200px;margin-bottom:0;">
        <input class="search-input" id="searchInput" type="text" placeholder="Search articles…" oninput="filterArticles()">
      </div>
    </div>
    <div class="filter-bar" id="catFilters">
      <button class="filter-btn active" data-cat="all" onclick="setCatFilter(this)">All</button>
      <button class="filter-btn" data-cat="Tournament History" onclick="setCatFilter(this)">Tournament History</button>
      <button class="filter-btn" data-cat="Team History" onclick="setCatFilter(this)">Team History</button>
      <button class="filter-btn" data-cat="Player Stories" onclick="setCatFilter(this)">Player Stories</button>
      <button class="filter-btn" data-cat="Esports Milestones" onclick="setCatFilter(this)">Milestones</button>
    </div>

    <div id="articlesContainer" style="display:flex;flex-direction:column;gap:1rem;">
      <div class="loading-state">Loading articles…</div>
    </div>
    <div id="noResults" style="display:none;" class="empty-state"><h3>No Articles Found</h3></div>
  </div>
</section>

<footer></footer>
<script src="assets/js/app.js"></script>
<script>
let allArticles = [];
let activeCat = 'all';

document.addEventListener('DOMContentLoaded', async () => {
  await renderNav('articles');
  renderFooter();
  allArticles = (await Api.getAll('articles')).sort((a,b)=>new Date(b.date)-new Date(a.date));
  renderArticles(allArticles);
  setTimeout(initFadeIn, 120);
});

function setCatFilter(btn) {
  document.querySelectorAll('#catFilters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  filterArticles();
}
function filterArticles() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = allArticles;
  if (activeCat !== 'all') list = list.filter(a=>a.category===activeCat);
  if (q) list = list.filter(a=>a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q));
  renderArticles(list);
}
function renderArticles(list) {
  const container = document.getElementById('articlesContainer');
  const noR = document.getElementById('noResults');
  if (!list.length) { container.innerHTML=''; noR.style.display='block'; return; }
  noR.style.display='none';
  container.innerHTML = list.map(a=>`
    <div class="article-card-large fade-in ${a.featured?'featured':''}" onclick="location.href='article-detail.html?id=${a.id}'">
      <div class="ac-header">
        <span class="ac-category">${a.category}</span>
        ${a.featured?'<span class="ac-featured-badge">★ Featured</span>':''}
      </div>
      <div class="ac-title">${a.title}</div>
      <div class="ac-summary">${a.summary}</div>
      <div class="ac-footer">
        <span class="ac-meta">${formatDate(a.date)} · ${a.author}</span>
        <a class="tc-link" href="article-detail.html?id=${a.id}" onclick="event.stopPropagation()">Read Article →</a>
      </div>
    </div>`).join('');
  setTimeout(initFadeIn, 50);
}
</script>
</body>
</html>
